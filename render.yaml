# Render Blueprint — MooDrew
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: moodbrew
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Render 대시보드에서 수동 입력
      - key: NODE_ENV
        value: production
